<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seiva Ads</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Temas (CSS Variables) ── */
    :root {
      --bg: #fff; --bg-alt: #edf5ed; --bg-alt-hover: #ddeedd;
      --bg-header: #fff; --bg-th: #f6f8fa; --bg-hover: #f9fafb;
      --bg-active: #f0f6ff; --bg-input: transparent; --bg-popup: #fff;
      --text: #1c2128; --text-sec: #444; --text-dim: #57606a; --text-muted: #8c959f;
      --border: #d0d7de; --border-cell: #e8ecf0;
      --logo: #38a832; --btn-bg: #38a832; --btn-hover: #2e8f29;
    }
    html.dark {
      --bg: #161b22; --bg-alt: #1e2d1e; --bg-alt-hover: #2a3d2a;
      --bg-header: #0d1117; --bg-th: #1c2128; --bg-hover: #1c2533;
      --bg-active: #1a2744; --bg-input: #0d1117; --bg-popup: #1c2128;
      --text: #e6edf3; --text-sec: #c9d1d9; --text-dim: #8b949e; --text-muted: #6e7681;
      --border: #30363d; --border-cell: #21262d;
      --logo: #4ac244; --btn-bg: #2ea043; --btn-hover: #3fb950;
    }

    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

    /* ── Header ── */
    .sheet-header {
      height: 52px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; background: var(--bg-header); border-bottom: 1px solid var(--border);
      position: fixed; top: 0; left: 0; right: 0; z-index: 100; gap: 12px;
    }
    .header-left  { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .header-logo  { font-weight: 700; font-size: 16px; color: var(--logo); letter-spacing: -0.3px; white-space: nowrap; }
    .header-sep   { color: var(--border); font-size: 18px; }
    .header-client{ font-size: 14px; color: var(--text-sec); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .save-indicator{ font-size: 12px; color: var(--text-muted); white-space: nowrap; }
    .btn { display: inline-flex; align-items: center; padding: 5px 14px; border-radius: 6px; border: 1px solid var(--border); font-size: 13px; font-family: inherit; cursor: pointer; font-weight: 500; transition: background .15s; color: var(--text); }
    .btn-primary  { background: var(--btn-bg); color: #fff; border-color: var(--btn-bg); }
    .btn-primary:hover:not(:disabled) { background: var(--btn-hover); }
    .btn-primary:disabled { opacity: .45; cursor: default; }
    .btn-ghost    { background: none; color: var(--text-sec); }
    .btn-ghost:hover { background: var(--bg-hover); }
    .btn-theme { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; cursor: pointer; font-size: 15px; line-height: 1; }

    /* ── Layout ── */
    .sheet-table-wrap { height: calc(100vh - 52px); margin-top: 52px; overflow: auto; }

    /* ── Table ── */
    /* table-layout:fixed + largura calculada em JS — garante que as larguras das colunas
       sejam respeitadas exatamente. A tabela transborda horizontalmente e o wrapper scrola. */
    .sheet-table { border-collapse: collapse; table-layout: fixed; font-size: 13px; background: var(--bg); }
    .sheet-table thead { position: sticky; top: 0; z-index: 20; }
    .sheet-table th {
      background: var(--bg-th); border: 1px solid var(--border);
      padding: 5px 8px; font-weight: 600; white-space: nowrap; overflow: hidden;
      text-align: left; font-size: 11px; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: .03em;
      position: relative; user-select: none;
    }
    /* Alça de redimensionamento de coluna */
    .col-resizer {
      position: absolute; right: 0; top: 0; bottom: 0; width: 4px;
      cursor: col-resize; z-index: 1;
    }
    .col-resizer:hover, .col-resizer.active { background: #1a73e8; opacity: .6; }
    .sheet-table td {
      border: 1px solid var(--border-cell); padding: 0; vertical-align: middle;
      height: 30px; cursor: default; position: relative;
    }
    .col-rn  { width: 36px; min-width: 36px; background: var(--bg-th) !important; color: var(--text-muted); font-size: 11px; text-align: right; padding: 0 6px !important; border-right: 2px solid var(--border) !important; user-select: none; }
    .col-act { width: 32px; min-width: 32px; text-align: center; }

    .sheet-row:hover td          { background: var(--bg-hover); }
    .sheet-row.row-active td     { background: var(--bg-active) !important; }
    .sheet-row.row-dirty .col-rn { box-shadow: inset 3px 0 0 #f59e0b; }
    .sheet-row.week-alt td       { background: var(--bg-alt); }
    .sheet-row.week-alt:hover td { background: var(--bg-alt-hover); }

    /* Célula: modo display */
    .cell-disp {
      padding: 0 7px; height: 30px; display: flex; align-items: center;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: cell; user-select: none; color: var(--text); font-size: 13px;
    }

    /* Célula: modo edição */
    td:focus-within {
      outline: 2px solid #1a73e8;
      outline-offset: -1px;
      z-index: 5;
    }
    /* Célula de data com picker aberto */
    td.dp-open {
      outline: 2px solid #1a73e8;
      outline-offset: -1px;
      z-index: 5;
      background: var(--bg-active) !important;
    }
    .cell-ed {
      width: 100%; height: 30px; padding: 0 6px;
      border: none; outline: none; background: var(--bg-input);
      font-size: 13px; font-family: inherit; color: var(--text);
      display: block;
    }
    select.cell-ed { cursor: pointer; background: var(--bg); }

    /* Campo somente-leitura */
    .cell-readonly { cursor: default !important; color: var(--text-dim); }

    /* Link clicável dentro de célula */
    .cell-link {
      color: #1a73e8; text-decoration: none; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; max-width: 100%;
      display: block;
    }
    .cell-link:hover { text-decoration: underline; }

    /* Status badge */
    .s-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; white-space: nowrap; }
    /* Badge clicável (rascunho / pendente) */
    .status-editable .s-badge { cursor: pointer; }
    .status-editable:hover .s-badge { filter: brightness(0.93); }

    /* Delete button */
    .btn-del { background: none; border: none; cursor: pointer; padding: 4px 7px; opacity: 0; font-size: 12px; color: #b91c1c; }
    .sheet-row:hover .btn-del { opacity: .5; }
    .btn-del:hover { opacity: 1 !important; }

    /* Barra adicionar */
    .add-row-bar { padding: 7px 16px; border-top: 1px solid var(--border); background: var(--bg); position: sticky; bottom: 0; }
    .btn-add-row { border: 1px dashed var(--text-muted); background: none; color: var(--text-dim); padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; font-family: inherit; }
    .btn-add-row:hover { background: var(--bg-hover); border-color: var(--text-sec); color: var(--text); }

    /* Loading */
    #sheet-loading { padding: 56px; text-align: center; color: var(--text-muted); font-size: 14px; }

    /* ── Datepicker flutuante ── */
    .datepicker {
      position: fixed; background: var(--bg-popup); border: 1px solid var(--border);
      border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,.25);
      padding: 10px; z-index: 400; width: 230px; user-select: none;
    }
    .dp-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .dp-title { font-weight: 600; font-size: 13px; color: var(--text); }
    .dp-nav { background: none; border: 1px solid var(--border); border-radius: 4px; padding: 1px 9px; cursor: pointer; font-size: 15px; color: var(--text-sec); line-height: 1.6; }
    .dp-nav:hover { background: var(--bg-hover); }
    .dp-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; }
    .dp-wd { text-align: center; font-size: 10px; font-weight: 600; color: var(--text-muted); padding: 3px 0; }
    .dp-d {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      font-size: 12px; border-radius: 4px; transition: background .1s;
    }
    .dp-d.dp-free    { cursor: pointer; }
    .dp-d.dp-free:hover { background: #dbeafe; }
    .dp-d.dp-blocked { color: #c0c8d4; cursor: default; }
    .dp-d.dp-today   { font-weight: 700; outline: 2px solid #0969da; outline-offset: -2px; }
    .dp-d.dp-sel     { background: #1a73e8 !important; color: #fff !important; font-weight: 700; border-radius: 50%; }

    /* ── Popup de texto longo ── */
    .text-popup {
      position: fixed; background: var(--bg-popup); border: 1px solid var(--border);
      border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,.25);
      padding: 10px; z-index: 400; width: 380px;
    }
    .tp-label {
      font-size: 11px; font-weight: 600; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px;
    }
    .tp-area {
      display: block; width: 100%; min-height: 100px; max-height: 300px;
      border: 1px solid var(--border); border-radius: 4px;
      padding: 6px 8px; font-size: 13px; font-family: inherit;
      color: var(--text); line-height: 1.5; resize: vertical; outline: none;
      background: var(--bg);
    }
    .tp-area:focus { border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,.15); }

    /* Toast */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1c2128; color: #fff; padding: 9px 18px; border-radius: 8px; font-size: 13px; z-index: 9999; transition: transform .25s; pointer-events: none; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.err  { background: #b91c1c; }
    .toast.ok   { background: #15803d; }
  </style>
</head>
<body>
  <header class="sheet-header">
    <div class="header-left">
      <span class="header-logo">Seiva Ads</span>
      <span class="header-sep">/</span>
      <span class="header-client" id="client-name">…</span>
    </div>
    <div class="header-right">
      <span class="save-indicator" id="save-ind"></span>
      <button class="btn btn-primary" id="btn-save" disabled>Salvar</button>
      <button class="btn-theme" id="btn-theme" title="Alternar tema">&#9790;</button>
      <button class="btn btn-ghost"   id="btn-logout">Sair</button>
    </div>
  </header>

  <div class="sheet-table-wrap">
    <div id="sheet-loading">Carregando…</div>
    <table class="sheet-table" id="sheet-table" style="display:none">
      <thead id="sheet-thead"></thead>
      <tbody id="sheet-tbody"></tbody>
    </table>
    <div class="add-row-bar" id="add-row-bar" style="display:none">
      <button class="btn-add-row" id="btn-add">+ Adicionar linha</button>
    </div>
  </div>

  <!-- Datepicker popup flutuante -->
  <div id="datepicker" class="datepicker" style="display:none">
    <div class="dp-hd">
      <button class="dp-nav" id="dp-prev">‹</button>
      <span class="dp-title" id="dp-title"></span>
      <button class="dp-nav" id="dp-next">›</button>
    </div>
    <div class="dp-grid" id="dp-grid"></div>
  </div>

  <!-- Popup de texto longo -->
  <div id="text-popup" class="text-popup" style="display:none">
    <div class="tp-label" id="tp-label"></div>
    <textarea id="tp-area" class="tp-area" placeholder="Digite o texto…"></textarea>
  </div>

  <div class="toast" id="toast"></div>
  <script type="module" src="client.js"></script>
</body>
</html>
